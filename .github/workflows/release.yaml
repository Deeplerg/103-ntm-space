name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: false
        default: "manual-build"

env:
  MODPACK_NAME: "103-ntm-space"
  LAUNCHER_VERSION: "11.0.2-1"
  PORTABLE_JAVA_VERSION: "21"
  BUILD_JAVA_VERSION: "21"
  LWJGL3IFY_VERSION: "3.0.26"
  INSTANCE_DIR: "103-ntm-space"

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    outputs:
      version: ${{ steps.set_version_variable.outputs.VERSION }}
      modpack_name: ${{ steps.export_vars.outputs.MODPACK_NAME }}
      launcher_version: ${{ steps.export_vars.outputs.LAUNCHER_VERSION }}
      portable_java_version: ${{ steps.export_vars.outputs.PORTABLE_JAVA_VERSION }}
      build_java_version: ${{ steps.export_vars.outputs.BUILD_JAVA_VERSION }}
      lwjgl3ify_version: ${{ steps.export_vars.outputs.LWJGL3IFY_VERSION }}
      instance_dir: ${{ steps.export_vars.outputs.INSTANCE_DIR }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set commit status - Pending
        uses: ./.github/actions/set-commit-status
        with:
          state: 'pending'
          desc: 'Building release...'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Version
        id: set_version_variable
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Export env variables for workflows
        id: export_vars
        run: |
          echo "MODPACK_NAME=${{ env.MODPACK_NAME }}" >> $GITHUB_OUTPUT
          echo "LAUNCHER_VERSION=${{ env.LAUNCHER_VERSION }}" >> $GITHUB_OUTPUT
          echo "PORTABLE_JAVA_VERSION=${{ env.PORTABLE_JAVA_VERSION }}" >> $GITHUB_OUTPUT
          echo "BUILD_JAVA_VERSION=${{ env.BUILD_JAVA_VERSION }}" >> $GITHUB_OUTPUT
          echo "LWJGL3IFY_VERSION=${{ env.LWJGL3IFY_VERSION }}" >> $GITHUB_OUTPUT
          echo "INSTANCE_DIR=${{ env.INSTANCE_DIR }}" >> $GITHUB_OUTPUT

  build-packs:
    permissions:
      contents: read
    needs: setup
    uses: ./.github/workflows/build-packs.yaml
    with:
      version: ${{ needs.setup.outputs.version }}
      modpack_name: ${{ needs.setup.outputs.modpack_name }}
      build_java_version: ${{ needs.setup.outputs.build_java_version }}
    secrets: inherit

  build-portables:
    needs: setup
    uses: ./.github/workflows/build-portables.yaml
    with:
      modpack_name: ${{ needs.setup.outputs.modpack_name }}
      launcher_version: ${{ needs.setup.outputs.launcher_version }}
      portable_java_version: ${{ needs.setup.outputs.portable_java_version }}
      lwjgl3ify_version: ${{ needs.setup.outputs.lwjgl3ify_version }}
      instance_dir: ${{ needs.setup.outputs.instance_dir }}

  build-pages:
    if: github.event_name == 'release'
    permissions:
      contents: read
      pages: write
    needs: setup
    uses: ./.github/workflows/build-pages.yaml
    with:
      version: ${{ needs.setup.outputs.version }}

  publish:
    needs: [setup, build-packs, build-portables]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: '*-artifact'
          path: .
          merge-multiple: true

      - name: Generate Artifact Attestations
        if: github.event_name == 'release'
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ env.MODPACK_NAME }}-Windows.zip
            ${{ env.MODPACK_NAME }}-Linux.tar.gz
            ${{ env.MODPACK_NAME }}-macOS.zip
            ${{ env.MODPACK_NAME }}-modrinth.mrpack
            ${{ env.MODPACK_NAME }}-client.zip
            ${{ env.MODPACK_NAME }}-server.zip

      - name: Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            ${{ env.MODPACK_NAME }}-Windows.zip \
            ${{ env.MODPACK_NAME }}-Linux.tar.gz \
            ${{ env.MODPACK_NAME }}-macOS.zip \
            ${{ env.MODPACK_NAME }}-modrinth.mrpack \
            ${{ env.MODPACK_NAME }}-client.zip \
            ${{ env.MODPACK_NAME }}-server.zip \
            --clobber

      - name: Upload Artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.VERSION }}
          path: |
            ${{ env.MODPACK_NAME }}-Windows.zip
            ${{ env.MODPACK_NAME }}-Linux.tar.gz
            ${{ env.MODPACK_NAME }}-macOS.zip
            ${{ env.MODPACK_NAME }}-modrinth.mrpack
            ${{ env.MODPACK_NAME }}-client.zip
            ${{ env.MODPACK_NAME }}-server.zip

  deploy-pages:
    if: github.event_name == 'release'
    needs: [build-pages, publish]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  finalize:
    needs: [setup, build-packs, build-portables, publish, deploy-pages]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set commit status - Success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: ./.github/actions/set-commit-status
        with:
          state: 'success'
          desc: 'Release build complete!'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set commit status - Failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        uses: ./.github/actions/set-commit-status
        with:
          state: 'failure'
          desc: 'Release build failed.'
          github_token: ${{ secrets.GITHUB_TOKEN }}