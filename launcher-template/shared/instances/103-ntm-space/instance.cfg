[General]
ConfigVersion=1.3
InstanceType=OneSix
name=103-ntm-space
IconKey=default

OverrideCommands=true
PreLaunchCommand=\"$INST_JAVA\" -jar packwiz-installer-bootstrap.jar --no-gui --side client \"https://deeplerg.github.io/103-ntm-space/pack.toml\"

